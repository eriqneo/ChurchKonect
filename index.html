<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchValue;
            },
            set: function(val) {
              fetchValue = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to make window.fetch writable:', e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ChurchConnect</title>
    <link rel="icon" href="/churchconnect-logo.svg" type="image/svg+xml" />
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C8A45C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/churchconnect-logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
